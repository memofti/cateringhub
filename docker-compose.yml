version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: db_name\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  redis:\n    image: redis:latest\n\n  backend:\n    build: ./backend\n    ports:\n      - '3000:3000'\n    environment:\n      DATABASE_URL: postgres://user:password@postgres/db_name\n    depends_on:\n      - postgres\n\n  frontend:\n    build: ./frontend\n    ports:\n      - '3001:3000'\n    depends_on:\n      - backend\n\nvolumes:\n  postgres_data: